name: Publish trainer site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .[dev]
      - name: Tests
        run: pytest -q
      # Deal sets + DD trick tables are content-addressed (INV4), so a stale
      # cache is harmless: changed problems miss and regenerate.
      - name: Restore trainer cache
        uses: actions/cache@v4
        with:
          path: .trainer_cache
          key: trainer-cache-${{ hashFiles('problems/**', 'bridge_trainer/**') }}
          restore-keys: trainer-cache-
      - name: Build site
        run: trainer publish problems --out _site --seed 42
      # enablement: true creates the Pages site on first run, so no manual
      # Settings -> Pages step is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
