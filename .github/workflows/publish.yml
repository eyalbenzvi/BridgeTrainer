name: Publish trainer site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .[dev]
      - name: Tests
        run: pytest -q
      # Deal sets + DD trick tables are content-addressed (INV4), so a stale
      # cache is harmless: changed problems miss and regenerate.
      - name: Restore trainer cache
        uses: actions/cache@v4
        with:
          path: .trainer_cache
          key: trainer-cache-${{ hashFiles('problems/**', 'bridge_trainer/**') }}
          restore-keys: trainer-cache-
      - name: Build site
        run: trainer publish problems --out _site --seed 42
      # Pushing a gh-pages branch auto-enables GitHub Pages (branch source),
      # which the workflow token IS allowed to do — unlike creating a Pages
      # site via the API (actions/configure-pages enablement fails with
      # "Resource not accessible by integration").
      - name: Deploy to gh-pages branch
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "publish site from ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
