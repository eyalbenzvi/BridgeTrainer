name: Deploy app

# Deploys the static web app shell to gh-pages on code changes. Problems and
# per-user progress live in Firestore, read by the client at runtime; the
# deploy ships only the static shell (HTML + ES modules + CSS).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .[dev]
      - name: Tests
        run: pytest -q
      - name: Build app shell
        # Problems and per-user data live in Firestore; the client reads them
        # at runtime (see web/bt-firebase.js). The deploy ships only the
        # static shell — data/ is no longer copied to the site.
        run: trainer webapp --out _site
      - name: Deploy to gh-pages
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy app from ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
