name: Deploy app

# Deploys the static web app shell to gh-pages on code changes, PRESERVING
# the problem pool (data/) that the producer workflow grows continuously.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .[dev]
      - name: Tests
        run: pytest -q
      - name: Build app shell
        run: trainer webapp --out _site
      - name: Preserve existing problem pool
        run: |
          if git fetch origin gh-pages --depth 1 2>/dev/null; then
            git worktree add _old origin/gh-pages
            [ -d _old/data ] && cp -r _old/data _site/data || true
          fi
      - name: Deploy to gh-pages
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy app from ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
