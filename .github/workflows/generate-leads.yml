name: generate leads

# Generate opening-lead problems with the Ben engine and push them straight to
# Firestore (the live problem pool the web app reads at runtime).
#
# Manual only. The Ben environment (TensorFlow + models + DDS) is cached
# between runs; the first run downloads ~3 GB, later runs restore in under a
# minute. Lead problems are written to data/*.json in-job, committed back to
# the triggering branch as a durable record, and uploaded to Firestore.
#
# Requires the repository secret FIREBASE_SERVICE_ACCOUNT: the full JSON of a
# Firebase service-account private key (Project settings -> Service accounts
# -> Generate new private key). See docs/firebase_setup.md.

on:
  workflow_dispatch:
    inputs:
      count:
        description: "lead problems to generate"
        default: "96"
      max_seconds:
        description: "generation time budget (seconds)"
        default: "6000"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache ben + venv
        uses: actions/cache@v4
        with:
          path: |
            ~/ben
            ~/benv
          key: ben-${{ hashFiles('scripts/setup_ben.sh') }}

      - name: Setup ben
        run: PYTHON=python3.12 bash scripts/setup_ben.sh "$HOME/ben" "$HOME/benv"

      - name: Install Firestore extra
        run: |
          "$HOME/benv/bin/pip" install -q -e '.[firestore]'

      - name: Generate lead problems
        run: |
          COUNT="${{ github.event.inputs.count || '96' }}"
          BUDGET="${{ github.event.inputs.max_seconds || '6000' }}"
          SEED=$(( $(date +%s) / 86400 ))000
          BEN_HOME="$HOME/ben" "$HOME/benv/bin/python" -m bridge_trainer.app.cli \
            lead-forge --count "$COUNT" --seed "$SEED" --pool data \
            --max-seconds "$BUDGET"

      - name: Push to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set — cannot push to Firestore."
            echo "Add it under Settings -> Secrets and variables -> Actions. See docs/firebase_setup.md."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa-key.json"
          "$HOME/benv/bin/python" -m bridge_trainer.app.cli \
            pool push --pool data --key "$RUNNER_TEMP/sa-key.json"
          rm -f "$RUNNER_TEMP/sa-key.json"

      - name: Commit generated problems
        run: |
          git config user.name "lead-forge bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "lead-forge: generate ${{ github.event.inputs.count || '96' }} lead problems"
          git push
