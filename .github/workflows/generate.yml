# Nightly problem generation with the Ben engine (cached between runs).
# First run downloads ~3 GB (TF + models); later runs restore the cache
# in under a minute. Generated problems land in a pool artifact that the
# publish workflow deploys.
name: generate

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "problems to generate (0 = none)"
        default: "10"
      remove:
        description: "problem ids to remove (space-separated, optional)"
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache ben + venv
        uses: actions/cache@v4
        with:
          path: |
            ~/ben
            ~/benv
          key: ben-${{ hashFiles('scripts/setup_ben.sh') }}

      - name: Setup ben
        run: PYTHON=python3.12 bash scripts/setup_ben.sh "$HOME/ben" "$HOME/benv"

      - name: Remove requested problems
        if: github.event.inputs.remove != ''
        run: |
          "$HOME/benv/bin/python" -m bridge_trainer.app.cli \
            pool rm ${{ github.event.inputs.remove }} --pool data

      - name: Generate
        if: github.event.inputs.count != '0'
        run: |
          COUNT="${{ github.event.inputs.count || '10' }}"
          SEED=$(( $(date +%s) / 86400 ))000
          BEN_HOME="$HOME/ben" "$HOME/benv/bin/python" -m bridge_trainer.app.cli \
            ben-forge --count "$COUNT" --seed "$SEED" --pool data \
            --max-seconds 5400

      - name: Commit pool
        run: |
          git config user.name "ben-forge bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "ben-forge: nightly pool growth"
          git push
