name: Produce problem bank

# Manually dispatched: fans problem generation out over parallel shard jobs
# (disjoint seed ranges), then merges the shards into the pool on gh-pages
# (data/), which the deployed app serves. A 100-problem bank lands in a few
# minutes instead of ~45 on one machine.

on:
  workflow_dispatch:
    inputs:
      count:
        description: "total problems to generate"
        default: "100"
      shards:
        description: "parallel shard jobs"
        default: "8"
      n_deals:
        description: "max simulated layouts per problem"
        default: "600"
      base_seed:
        description: "base seed (empty = derived from run id)"
        default: ""

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.m.outputs.shards }}
      per_shard: ${{ steps.m.outputs.per_shard }}
      base_seed: ${{ steps.m.outputs.base_seed }}
    steps:
      - id: m
        run: |
          n=${{ inputs.shards }}
          count=${{ inputs.count }}
          echo "shards=$(python3 -c "import json; print(json.dumps(list(range($n))))")" >> "$GITHUB_OUTPUT"
          echo "per_shard=$(( (count + n - 1) / n ))" >> "$GITHUB_OUTPUT"
          seed="${{ inputs.base_seed }}"
          [ -z "$seed" ] && seed=$(( ${{ github.run_id }} % 1000000000 ))
          echo "base_seed=$seed" >> "$GITHUB_OUTPUT"

  produce:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Generate shard
        run: |
          trainer produce --pool pool_shard \
            --count ${{ needs.plan.outputs.per_shard }} \
            --n ${{ inputs.n_deals }} \
            --seed $(( ${{ needs.plan.outputs.base_seed }} + ${{ matrix.shard }} * 1000000 )) \
            --max-seconds 3000
      - uses: actions/upload-artifact@v4
        with:
          name: pool-shard-${{ matrix.shard }}
          path: pool_shard

  merge:
    needs: [plan, produce]
    runs-on: ubuntu-latest
    # Serialize against the app-deploy workflow, which force-pushes gh-pages
    # (it preserves data/ by copying — racing it could drop new problems).
    concurrency:
      group: pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - uses: actions/download-artifact@v4
        with:
          path: shards
      - name: Merge shards into pool
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path
          from bridge_trainer.pool.store import ProblemPool

          pool = ProblemPool("pages/data")
          existing = set(pool.ids())
          added = 0
          for path in sorted(Path("shards").glob("*/problems/*.json")):
              rec = json.loads(path.read_text())
              if rec["id"] in existing:
                  continue
              pool.add(rec)
              existing.add(rec["id"])
              added += 1
          pool.rebuild_index()
          print(f"added {added} problems; pool now {len(existing)}")
          EOF
      - name: Push pool to gh-pages
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet && echo "no new problems" && exit 0
          git commit -m "produce: grow problem pool (run ${{ github.run_id }})"
          git push
